<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Steps - Hành Trình Của Bé</title>
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Georgia&display=swap');
        
        :root {
            --font-serif: "Georgia", serif;
            --font-sans: "Helvetica Neue", Arial, sans-serif;
            --color-paper: #FDFBF7;
            --color-side: #F4F1EA;
            --color-ink: #4A453E;
            --color-ink-muted: #7C7469;
            --color-accent: #8A9A5B;
            --color-line: #D9D2C5;
        }

        body {
            background-color: var(--color-paper);
            color: var(--color-ink);
            font-family: var(--font-sans);
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4 {
            font-family: var(--font-serif);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--color-side);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--color-line);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React and Libraries from ESM.sh -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react-dom": "https://esm.sh/react-dom@19.0.0/client",
        "motion/react": "https://esm.sh/motion@12.23.24/react",
        "lucide-react": "https://esm.sh/lucide-react@0.473.0"
      }
    }
    </script>

    <script type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom';
        import { motion, AnimatePresence } from 'motion/react';
        import { Calendar, Scale, Ruler, Heart } from 'lucide-react';

        // --- DATA ---
        const BABY_DATA = {
            name: "Nguyễn Minh Khôi",
            birthDate: "15/05/2024",
            birthWeight: "3.2kg",
            birthHeight: "50cm",
            currentAge: "11 tháng tuổi"
        };

        const MILESTONES = [
            {
                id: "1",
                date: "15/05/2024",
                title: "Chào đời",
                description: "Khoảnh khắc tuyệt vời nhất khi ba mẹ được gặp con lần đầu tiên. Chào mừng thiên thần nhỏ đến với thế giới!",
                photos: [
                    { url: "https://picsum.photos/seed/baby1/800/800", caption: "Lần đầu gặp mẹ" },
                    { url: "https://picsum.photos/seed/baby2/800/800", caption: "Giấc ngủ đầu tiên" },
                    { url: "https://picsum.photos/seed/baby3/800/800", caption: "Bàn tay bé nhỏ" }
                ]
            },
            {
                id: "2",
                date: "20/06/2024",
                title: "Đầy tháng",
                description: "Buổi lễ đầy tháng ấm cúng bên gia đình. Con đã bắt đầu biết hóng chuyện và cười rất tươi.",
                photos: [
                    { url: "https://picsum.photos/seed/baby4/800/800", caption: "Tiệc đầy tháng" },
                    { url: "https://picsum.photos/seed/baby5/800/800", caption: "Nụ cười tỏa nắng" },
                    { url: "https://picsum.photos/seed/baby6/800/800", caption: "Món quà của bà" }
                ]
            },
            {
                id: "3",
                date: "15/11/2024",
                title: "Lần đầu biết bò",
                description: "Nhà bây giờ không còn yên tĩnh nữa rồi! Con đã có thể tự mình khám phá mọi ngóc ngách trong nhà.",
                photos: [
                    { url: "https://picsum.photos/seed/baby7/800/800", caption: "Bò điệu nghệ" },
                    { url: "https://picsum.photos/seed/baby8/800/800", caption: "Phát hiện đồ chơi mới" },
                    { url: "https://picsum.photos/seed/baby9/800/800", caption: "Chinh phục bậc cửa" }
                ]
            },
            {
                id: "4",
                date: "01/03/2025",
                title: "Những bước đi đầu đời",
                description: "Chập chững những bước đi đầu tiên. Ba mẹ vô cùng tự hào về cậu bé kiên cường của mình.",
                photos: [
                    { url: "https://picsum.photos/seed/baby10/800/800", caption: "Tập đi cùng ba" },
                    { url: "https://picsum.photos/seed/baby11/800/800", caption: "Tự đứng vững" },
                    { url: "https://picsum.photos/seed/baby12/800/800", caption: "Bước chân đầu tiên" }
                ]
            }
        ];

        // --- COMPONENTS ---

        function PhotoAlbum({ photos }) {
            return (
                <div className="grid grid-cols-3 gap-3">
                    {photos.map((photo, index) => (
                        <motion.div
                            key={index}
                            whileHover={{ scale: 1.05 }}
                            className="relative aspect-square rounded-xl overflow-hidden shadow-sm border border-[var(--color-line)] bg-[#EFEDE8]"
                        >
                            <img 
                                src={photo.url} 
                                alt={photo.caption} 
                                className="w-full h-full object-cover transition-opacity hover:opacity-90"
                            />
                            {photo.caption && (
                                <div className="absolute inset-0 bg-[var(--color-accent)]/20 opacity-0 hover:opacity-100 transition-opacity flex items-end p-2">
                                    <p className="text-[var(--color-ink)] text-[10px] font-bold bg-white/80 px-2 py-1 rounded-md">
                                        {photo.caption}
                                    </p>
                                </div>
                            )}
                        </motion.div>
                    ))}
                </div>
            );
        }

        function Sidebar({ info }) {
            return (
                <aside className="w-full lg:w-[420px] lg:h-screen lg:fixed left-0 top-0 bg-[var(--color-side)] border-r border-[var(--color-line)] p-8 lg:p-12 flex flex-col justify-between overflow-y-auto">
                    <div className="space-y-8">
                        <motion.div 
                            initial={{ opacity: 0, y: 20 }}
                            animate={{ opacity: 1, y: 0 }}
                            className="aspect-square w-full bg-[#E6E2D8] rounded-[160px_160px_20px_20px] overflow-hidden border-8 border-white shadow-lg"
                        >
                            <img 
                                src="https://picsum.photos/seed/babyhero/800/1000" 
                                alt={info.name} 
                                className="w-full h-full object-cover"
                            />
                        </motion.div>

                        <div className="intro">
                            <h1 className="text-[42px] leading-[1.1] mb-3 text-[var(--color-ink)]">
                                {info.name.split(' ').slice(-2).join(' ')}<br />
                                <span className="text-[28px] opacity-70 font-normal">({info.name})</span>
                            </h1>
                            <p className="text-[var(--color-ink-muted)] leading-relaxed text-[15px]">
                                Hành trình của những bước chân đầu tiên, những nụ cười trong trẻo và sự trưởng thành đầy kỳ diệu của thiên thần nhỏ trong gia đình chúng ta.
                            </p>
                        </div>
                    </div>

                    <div className="stats mt-8 pt-8 border-t border-[var(--color-line)] grid grid-cols-3 gap-4">
                        <div className="stat-item">
                            <span className="block text-[11px] uppercase tracking-widest text-[var(--color-ink-muted)] mb-1 font-bold">Ngày sinh</span>
                            <b className="font-serif text-[18px] text-[var(--color-accent)] leading-none">{info.birthDate}</b>
                        </div>
                        <div className="stat-item">
                            <span className="block text-[11px] uppercase tracking-widest text-[var(--color-ink-muted)] mb-1 font-bold">Cân nặng</span>
                            <b className="font-serif text-[18px] text-[var(--color-accent)] leading-none">{info.birthWeight}</b>
                        </div>
                        <div className="stat-item">
                            <span className="block text-[11px] uppercase tracking-widest text-[var(--color-ink-muted)] mb-1 font-bold">Chiều dài</span>
                            <b className="font-serif text-[18px] text-[var(--color-accent)] leading-none">{info.birthHeight}</b>
                        </div>
                    </div>
                </aside>
            );
        }

        function Timeline({ milestones }) {
            return (
                <section className="flex-1 lg:ml-[420px] p-8 lg:p-16 min-h-screen bg-[var(--color-paper)]">
                    <h2 className="text-[24px] font-serif mb-12 relative inline-block">
                        Dòng Thời Gian Hạnh Phúc
                        <div className="absolute -bottom-2 left-0 w-10 h-[2px] bg-[var(--color-accent)]"></div>
                    </h2>

                    <div className="relative pl-10">
                        <div className="absolute left-[7px] top-2 bottom-0 w-[2px] bg-[var(--color-line)] rounded-full"></div>
                        
                        <div className="space-y-16">
                            {milestones.map((milestone) => (
                                <motion.div
                                    key={milestone.id}
                                    initial={{ opacity: 0, x: 20 }}
                                    whileInView={{ opacity: 1, x: 0 }}
                                    viewport={{ once: true }}
                                    className="relative"
                                >
                                    <div className="absolute -left-[41px] top-1.5 w-4 h-4 bg-[var(--color-accent)] rounded-full border-4 border-[var(--color-paper)] z-10" />
                                    
                                    <div className="flex justify-between items-baseline mb-3">
                                        <h3 className="text-[20px] font-serif text-[var(--color-ink)]">{milestone.title}</h3>
                                        <span className="text-[13px] text-[var(--color-ink-muted)] italic">{milestone.date}</span>
                                    </div>
                                    
                                    <p className="text-[14px] text-[var(--color-ink-muted)] leading-[1.4] mb-4">
                                        {milestone.description}
                                    </p>
                                    
                                    <PhotoAlbum photos={milestone.photos} />
                                </motion.div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        function App() {
            return (
                <div className="flex flex-col lg:flex-row min-h-screen">
                    <Sidebar info={BABY_DATA} />
                    <Timeline milestones={MILESTONES} />
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
